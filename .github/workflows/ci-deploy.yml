name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

  deploy:
    name: Trigger Render deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Deploy with Render hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is empty, skipping deploy hook."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL?ref=$GITHUB_SHA"
